<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker & Java | Live Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex flex-col items-center justify-center font-sans text-slate-800">
    
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-4 border-blue-600">
        <div class="mb-6">
            <svg class="w-16 h-16 mx-auto text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
            </svg>
        </div>
        
        <h1 class="text-2xl font-extrabold mb-1">API Node Status</h1>
        <p class="text-sm text-slate-500 mb-8">Architektura Mikroserwisów (Spring Boot + Nginx)</p>
        
        <div class="bg-slate-50 rounded-xl p-4 mb-4 border border-slate-200">
            <p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1">ID Kontenera obsługującego żądanie</p>
            <p id="container-id" class="text-2xl font-mono font-bold text-slate-700 transition-all duration-300">Ładowanie...</p>
        </div>

        <div class="bg-blue-50 rounded-xl p-4 border border-blue-100 mb-6 text-left">
            <div class="flex justify-between items-center mb-1">
                <p class="text-xs text-blue-400 uppercase font-bold tracking-widest">Obecne zużycie pamięci:</p>
                <p class="text-xs text-blue-500 font-bold" id="memory-text">-- / -- MB</p>
            </div>
            
            <div class="flex justify-between items-end mb-2">
                <p id="used-memory" class="text-3xl font-mono font-bold text-blue-700">0 MB</p>
                <p id="memory-percent" class="text-lg font-bold text-blue-500 mb-1">0%</p>
            </div>
            
            <div class="w-full bg-blue-200 rounded-full h-3 mb-1 overflow-hidden">
                <div id="memory-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
            <p class="text-[10px] text-blue-400 text-right uppercase">Auto-odświeżanie: 1s</p>
        </div>
        
        <button onclick="fetchData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
            Wymuś nowe żądanie
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
